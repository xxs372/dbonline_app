name: Build Signed iOS IPA

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: 'Export method for IPA'
        required: true
        default: 'app-store'
        type: choice
        options:
          - app-store
          - ad-hoc
          - development
          - enterprise

env:
  NODE_VERSION: '24'
  RUBY_VERSION: '3.3.11'
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8
  COCOAPODS_DISABLE_STATS: 'true'

permissions:
  contents: read

jobs:
  build-signed-ios:
    name: Build signed IPA (${{ github.event.inputs.export_method || 'app-store' }})
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JavaScript dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile --config.node-linker=hoisted --config.package-import-method=copy

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Install CocoaPods
        shell: bash
        run: |
          set -euo pipefail
          rm -rf vendor/bundle .bundle/config
          bundle config set path vendor/bundle
          bundle lock --update cocoapods xcodeproj activesupport concurrent-ruby
          bundle install --jobs 4 --retry 3
          for attempt in 1 2 3; do
            echo "pod install attempt ${attempt}"
            if bundle exec pod install --project-directory=ios --verbose --clean-install; then
              break
            else
              status="$?"
            fi
            if [ "${attempt}" = "3" ]; then
              exit "${status}"
            fi
            rm -rf ios/Pods ios/Podfile.lock $HOME/Library/Caches/CocoaPods
            bundle exec pod cache clean --all || true
          done

      - name: Import Apple Developer Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/build.keychain
          echo "${BUILD_CERTIFICATE_BASE64}" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "${P12_PASSWORD}" -T /usr/bin/codesign
          rm -f cert.p12
          echo "${BUILD_PROVISION_PROFILE_BASE64}" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep UUID -A1 -a profile.mobileprovision | grep -oE "[0-9A-F-]{36}")
          cp profile.mobileprovision "~/Library/MobileDevice/Provisioning Profiles/${UUID}.mobileprovision"
          rm -f profile.mobileprovision
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" build.keychain

      - name: Build signed app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/artifacts
          xcodebuild \
            -workspace ios/DBOnline.xcworkspace \
            -scheme DBOnline \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            -allowProvisioningUpdates \
            build | tee build/artifacts/xcodebuild.log

      - name: Export signed IPA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/artifacts
          cat > build/exportOptions.plist << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>${{ github.event.inputs.export_method || 'app-store' }}</string>
    <key>teamID</key>
    <string>${{ secrets.IOS_TEAM_ID }}</string>
    <key>signingStyle</key>
    <string>manual</string>
    <key>stripSwiftSymbols</key>
    <true/>
</dict>
</plist>
EOF
          xcodebuild \
            -exportArchive \
            -archivePath build/DerivedData/Build/Products/Release-iphoneos/DBOnline.app \
            -exportPath build/artifacts/ \
            -exportOptionsPlist build/exportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload signed IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: DBOnline-signed-ios
          path: build/artifacts/
          retention-days: 30
          if-no-files-found: error
